# All runtime variables are set via .env file (see .env.example)
# Rebuild: DOCKER_BUILDKIT=1 docker compose build --parallel
# Run:     docker compose up -d

services:
  secundus_dermis:
    container_name: secundus_dermis
    build:
      context: .
      dockerfile: app/Dockerfile
    env_file:
      - .env
    volumes:
      - /tmp/secundus_dermis_data:/app/data
    restart: unless-stopped
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  ngrok:
    image: ngrok/ngrok:latest
    command: http https://secundus_dermis:8000 --url ${NGROK_DOMAIN}
    env_file:
      - .env
    depends_on:
      secundus_dermis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app_network

networks:
  app_network:
    driver: bridge