# Backend unit tests + optional Kaggle dataset download (for same-repo pushes/PRs).
# Test strategy and backlog: .github/tests/SCOPE.md
#
# Configure repository secret: KAGGLE_API_TOKEN (Kaggle “Create New API Token” / KGAT_…).
# Fork PRs do not receive secrets; the dataset step is skipped and only pytest runs.
# The `app/data/kaggle` cache avoids re-downloading ~650 MB on every commit.

name: Backend CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install backend dependencies (includes kaggle + pytest)
        run: uv sync --project app/backend

      - uses: actions/cache@v4
        id: kaggle-cache
        with:
          path: app/data/kaggle
          key: kaggle-deep-fashion-${{ runner.os }}-v2

      - name: Download and extract Kaggle dataset
        if: ${{ secrets.KAGGLE_API_TOKEN != '' }}
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        working-directory: app/backend
        run: uv run python download_data.py

      - name: Pytest (unit)
        run: uv run --project app/backend pytest .github/tests/unit -v
